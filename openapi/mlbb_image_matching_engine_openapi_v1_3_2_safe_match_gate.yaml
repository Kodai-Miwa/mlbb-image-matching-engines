openapi: 3.1.0
info:
  title: MLBB Image Matching Engine V1.3.2 Safe Match Gate
  version: v1.3.2-safe-match-gate-20260705
  description: Candidate-only MLBB result-screen image matching API with Safe Match Gate.
servers:
  - url: https://mlbb-image-matching-engines.onrender.com
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  engine: { type: string }
                  version: { type: string }
                  profile_id: { type: string }
                  reference_icon_count: { type: integer }
                  unique_hero_count: { type: integer }
                required: [status, engine, version, profile_id, reference_icon_count, unique_hero_count]
  /v1/mlbb/image-match/analyze:
    post:
      operationId: analyzeMLBBResultScreen
      summary: Analyze MLBB result screen
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                image_base64:
                  type: string
                screen_type:
                  type: string
                  enum: [result_screen]
                  default: result_screen
                top_k:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 5
                return_debug_samples:
                  type: boolean
                  default: false
              required: [image_base64]
      responses:
        "200":
          description: Candidate-only matching report
          content:
            application/json:
              schema:
                type: object
                properties:
                  engine: { type: string }
                  version: { type: string }
                  profile_id: { type: string }
                  hero_lock_allowed: { type: boolean }
                  reference_icon_count: { type: integer }
                  unique_hero_count: { type: integer }
                  slots:
                    type: array
                    items:
                      type: object
                      properties:
                        slot: { type: string }
                        side: { type: string }
                        row_index: { type: integer }
                        match_status:
                          type: string
                          enum: [strong, ambiguous, weak, unregistered]
                        top_candidate_allowed: { type: boolean }
                        safe_gate_flags:
                          type: array
                          items: { type: string }
                        matched_candidates:
                          type: array
                          items:
                            type: object
                        hero_lock_allowed: { type: boolean }
                required: [engine, version, profile_id, hero_lock_allowed, reference_icon_count, unique_hero_count, slots]
        "400":
          description: Bad request
        "401":
          description: Invalid or missing API key
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
